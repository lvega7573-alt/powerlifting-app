<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Powerlifting App</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="app">

<!-- HOME -->

<div id="home" class="screen active">

<h1 class="logo">POWERLIFT</h1>

<button class="mainButton" onclick="openTraining()">
ENTRENAMIENTO
</button>

<button class="mainButton" onclick="openStats()">
ESTADÍSTICAS
</button>

</div>


<!-- TRAINING -->

<div id="training" class="screen">

<h2>Entrenamientos</h2>

<div id="daysContainer"></div>

<button class="backButton" onclick="goHome()">Volver</button>

</div>


<!-- WORKOUT -->

<div id="workout" class="screen">

<h2 id="dayTitle"></h2>

<div id="workoutContainer"></div>

<button class="backButton" onclick="openTraining()">Volver</button>

</div>


<!-- STATS -->

<div id="stats" class="screen">

<h2>Estadísticas</h2>

<canvas id="squatChart"></canvas>

<canvas id="benchChart"></canvas>

<canvas id="deadliftChart"></canvas>

<button class="backButton" onclick="goHome()">Volver</button>

</div>

</div>

<script src="training.js"></script>
<script src="app.js"></script>

</body>
</html>
