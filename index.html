<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Powerlifting Pro</title>

<script src="training-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system;
background:#0e0e0e;
color:white;
text-align:center;
margin:0;
}

button{
width:80%;
padding:22px;
margin:12px;
font-size:22px;
border-radius:14px;
border:none;
background:#1f1f1f;
color:white;
}

.big{
font-size:28px;
background:#222;
}

input{
width:80px;
padding:10px;
margin:10px;
}

.timer{
font-size:28px;
margin:20px;
}

canvas{
background:white;
margin:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div id="app"></div>

<script>

const app=document.getElementById("app")

function home(){

app.innerHTML=`

<h1>POWERLIFTING PRO</h1>

<button class="big" onclick="training()">🏋️ Entrenamiento</button>

<button class="big" onclick="stats()">📊 Estadísticas</button>

`

}

function training(){

let html="<h2>Entrenamiento</h2>"

for(let d in TRAINING_DAYS){

html+=`<button onclick="day(${d})">Día ${d}</button>`

}

html+=`<button onclick="home()">Volver</button>`

app.innerHTML=html

}

function day(d){

let day=TRAINING_DAYS[d]

let html=`<h2>${day.title}</h2>`

day.blocks.forEach((b,i)=>{

if(b.type=="text"){

html+=`<p>${b.label}</p>`

}

if(b.type=="exercise"){

html+=`<h3>${b.name}</h3>`

b.sets.forEach((s,j)=>{

let id=`${d}-${i}-${j}`

html+=`

<div>

${s.kg}kg × ${s.reps}

<input id="r${id}" placeholder="real">

<button onclick="save('${id}')">✔</button>

<button onclick="rest(${s.rest})">⏱</button>

</div>

`

})

}

})

html+=`<div class="timer" id="timer"></div>`

html+=`<button onclick="training()">Volver</button>`

app.innerHTML=html

}

function save(id){

let v=document.getElementById("r"+id).value

localStorage.setItem(id,v)

}

let interval

function rest(sec){

clearInterval(interval)

let t=sec

interval=setInterval(()=>{

let m=Math.floor(t/60)

let s=t%60

document.getElementById("timer").innerText=
(m<10?"0"+m:m)+":"+(s<10?"0"+s:s)

t--

if(t<0) clearInterval(interval)

},1000)

}

function stats(){

let data=[]

for(let k in localStorage){

if(!isNaN(localStorage[k])){

data.push(localStorage[k])

}

}

app.innerHTML=`

<h2>Estadísticas</h2>

<canvas id="chart"></canvas>

<button onclick="home()">Volver</button>

`

new Chart(document.getElementById("chart"),{

type:"line",

data:{

labels:data.map((_,i)=>i+1),

datasets:[{

label:"Peso levantado",

data:data

}]

}

})

}

home()

</script>

</body>
</html>
