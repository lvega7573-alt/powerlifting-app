<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Powerlifting Pro</title>

<link rel="stylesheet" href="./style.css">

</head>


<body>

<div id="app">

<!-- HOME -->
<div id="home" class="screen active">

<h1>POWERLIFTING</h1>

<button class="mainButton" id="btnTraining">
ENTRENAMIENTO
</button>

<button class="mainButton" id="btnStats">
ESTADÍSTICAS
</button>

</div>


<!-- DIAS -->
<div id="trainingDays" class="screen">

<h2>PLAN 14 DÍAS</h2>

<div id="daysContainer"></div>

<button class="backButton" id="backHome1">Volver</button>

</div>


<!-- WORKOUT -->
<div id="workout" class="screen">

<h2 id="workoutTitle"></h2>

<div id="exerciseContainer"></div>

<button class="timerButton" id="startTimer">
Iniciar descanso
</button>

<div id="timer">00:00</div>

<button class="backButton" id="backDays">Volver</button>

</div>


<!-- STATS -->
<div id="stats" class="screen">

<h2>Estadísticas</h2>

<canvas id="progressChart"></canvas>

<button class="backButton" id="backHome2">Volver</button>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./app.js"></script>

</body>
</html>
