<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Powerlifting Tracker</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div id="app">

<h1 class="logo">POWERLIFTING TRACKER</h1>

<div id="home">

<button class="mainBtn" onclick="openTraining()">
ENTRENAMIENTOS
</button>

<button class="mainBtn" onclick="openStats()">
ESTADÍSTICAS
</button>

</div>

<div id="trainingScreen" class="hidden">

<h2>Plan 14 días</h2>

<div id="daysList"></div>

<button onclick="goHome()" class="backBtn">Volver</button>

</div>

<div id="dayDetail" class="hidden"></div>

<div id="statsScreen" class="hidden">

<h2>Estadísticas</h2>

<canvas id="volumeChart"></canvas>
<canvas id="progressChart"></canvas>

<button onclick="goHome()" class="backBtn">Volver</button>

</div>

</div>

<script src="trainingData.js"></script>
<script src="storage.js"></script>
<script src="timer.js"></script>
<script src="stats.js"></script>
<script src="app.js"></script>

</body>
</html>
