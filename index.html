<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powerlifting Peak</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<div id="home">
<h1>POWERLIFTING PEAK</h1>

<button onclick="openTraining()">🏋️ Entrenamientos</button>
<button onclick="openStats()">📊 Estadísticas</button>

</div>


<div id="training" class="hidden">

<h2>Plan de 14 días</h2>

<div id="daysList"></div>

<button onclick="goHome()">⬅ Volver</button>

</div>


<div id="stats" class="hidden">

<h2>Estadísticas</h2>

<div class="kpi">
Series completadas: <span id="seriesDone">0</span>
</div>

<div class="kpi">
Peso total levantado: <span id="totalWeight">0</span> kg
</div>

<div class="kpi">
Promedio descanso: <span id="avgRest">0</span> s
</div>

<canvas id="volumeChart"></canvas>

<button onclick="goHome()">⬅ Volver</button>

</div>

<script src="app.js"></script>

</body>
</html>
