<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Powerlifting Coach</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

button{
padding:15px;
margin:10px;
font-size:18px;
background:#ff3b30;
color:white;
border:none;
border-radius:10px;
}

input{
padding:10px;
font-size:18px;
margin:10px;
border-radius:10px;
}

#timer{
font-size:50px;
margin:20px;
}
</style>

</head>

<body>

<h1>Powerlifting Coach</h1>

<h2>Registro de Serie</h2>

<button onclick="startTimer()">Iniciar Serie</button>

<div id="timer">00:00</div>

<br>

<label>Peso objetivo</label><br>
<input id="target">

<br>

<label>Peso real</label><br>
<input id="actual">

<br>

<button onclick="saveSet()">Guardar serie</button>

<script>

let time=0
let timerInterval

function startTimer(){

clearInterval(timerInterval)

time=0

timerInterval=setInterval(()=>{

time++

let min=Math.floor(time/60)
let sec=time%60

document.getElementById("timer").innerText=
String(min).padStart(2,"0")+":"+
String(sec).padStart(2,"0")

},1000)

}

function saveSet(){

let target=document.getElementById("target").value
let actual=document.getElementById("actual").value

let log={
date:new Date(),
target:target,
actual:actual,
rest:time
}

let history=JSON.parse(localStorage.getItem("training"))||[]

history.push(log)

localStorage.setItem("training",JSON.stringify(history))

alert("Serie guardada")

}

</script>

</body>
</html>
