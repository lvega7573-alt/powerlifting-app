<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powerlifting Coach</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

<h1 class="logo">POWERLIFTING</h1>

<div id="home">

<button class="mainBtn" onclick="openTraining()">ENTRENAMIENTO</button>

<button class="mainBtn" onclick="openStats()">ESTADÍSTICAS</button>

</div>

<div id="training" class="hidden">

<h2>Seleccionar día</h2>

<div id="daysContainer"></div>

<button class="backBtn" onclick="goHome()">Volver</button>

</div>

<div id="workout" class="hidden"></div>

<div id="stats" class="hidden">

<h2>Estadísticas</h2>

<canvas id="progressChart"></canvas>

<button class="backBtn" onclick="goHome()">Volver</button>

</div>

</div>

<script src="training-data.js"></script>
<script src="app.js"></script>

</body>
</html>
