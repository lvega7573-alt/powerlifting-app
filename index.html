<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powerlifting Trainer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

<!-- HOME -->
<div id="home" class="screen active">

<h1>POWERLIFTING</h1>

<button class="mainButton" onclick="openTraining()">
ENTRENAMIENTO
</button>

<button class="mainButton" onclick="openStats()">
ESTADÍSTICAS
</button>

</div>


<!-- LISTA DE DIAS -->
<div id="trainingDays" class="screen">

<h2>PLAN DE 14 DÍAS</h2>

<div id="daysContainer"></div>

<button class="backButton" onclick="goHome()">Volver</button>

</div>


<!-- ENTRENAMIENTO -->
<div id="workout" class="screen">

<h2 id="workoutTitle"></h2>

<div id="exerciseContainer"></div>

<button class="timerButton" onclick="startRest()">Iniciar descanso</button>

<div id="timer">00:00</div>

<button class="backButton" onclick="openTraining()">Volver</button>

</div>


<!-- ESTADISTICAS -->
<div id="stats" class="screen">

<h2>PROGRESO</h2>

<canvas id="progressChart"></canvas>

<button class="backButton" onclick="goHome()">Volver</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
