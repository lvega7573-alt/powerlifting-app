<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Powerlifting Coach</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="app">

<h1 class="title">POWERLIFTING</h1>

<div id="home">

<button class="mainButton" onclick="openTraining()">
🏋️ ENTRENAMIENTO
</button>

<button class="mainButton" onclick="openStats()">
📊 ESTADÍSTICAS
</button>

</div>

<div id="trainingScreen" class="hidden">

<button class="back" onclick="goHome()">← Volver</button>

<h2>Días de entrenamiento</h2>

<div id="daysContainer"></div>

</div>

<div id="dayScreen" class="hidden">

<button class="back" onclick="backToDays()">← Volver</button>

<h2 id="dayTitle"></h2>

<div id="workout"></div>

</div>

<div id="statsScreen" class="hidden">

<button class="back" onclick="goHome()">← Volver</button>

<h2>Estadísticas</h2>

<canvas id="squatChart"></canvas>
<canvas id="benchChart"></canvas>
<canvas id="deadliftChart"></canvas>

</div>

</div>

<script src="training.js"></script>
<script src="app.js"></script>

</body>
</html>
